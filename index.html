<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nabu PFP Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" width="32" height="32">
          <circle cx="16" cy="16" r="15" fill="#2563EB"/>
          <path d="M10 12 L16 8 L22 12 L22 20 L16 24 L10 20Z" fill="white" opacity="0.9"/>
          <circle cx="16" cy="16" r="3" fill="#2563EB"/>
        </svg>
        <span class="logo-text">Nabu PFP Studio</span>
      </div>
      <p class="tagline">Buat PFP unik dengan stiker keren</p>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Left: Canvas Area -->
      <section class="canvas-section">
        <div class="canvas-toolbar">
          <button id="btnUpload" class="btn btn-primary" title="Upload gambar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload Foto
          </button>
          <input type="file" id="fileInput" accept="image/*" hidden>
          <button id="btnDelete" class="btn btn-danger" title="Hapus stiker terpilih" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
            Hapus
          </button>
          <button id="btnClear" class="btn btn-ghost" title="Hapus semua stiker">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            Reset
          </button>
          <div class="toolbar-spacer"></div>
          <button id="btnDownload" class="btn btn-success" title="Download gambar" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download
          </button>
        </div>

        <div class="canvas-wrapper" id="canvasWrapper">
          <div class="upload-placeholder" id="uploadPlaceholder">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <p>Klik <strong>Upload Foto</strong> atau drop gambar di sini</p>
            <p class="hint">Mendukung JPG, PNG, WEBP</p>
          </div>
          <canvas id="mainCanvas"></canvas>
        </div>
      </section>

      <!-- Right: Sticker Panel -->
      <aside class="sticker-panel">
        <div class="panel-header">
          <h2>Stiker Aksesoris</h2>
          <span class="sticker-count" id="stickerCount"></span>
        </div>
        <div class="sticker-tabs" id="stickerTabs">
          <button class="tab-btn active" data-tab="all">Semua</button>
          <button class="tab-btn" data-tab="1">Set 1</button>
          <button class="tab-btn" data-tab="2">Set 2</button>
          <button class="tab-btn" data-tab="3">Set 3</button>
          <button class="tab-btn" data-tab="4">Set 4</button>
          <button class="tab-btn" data-tab="5">Set 5</button>
          <button class="tab-btn" data-tab="6">Set 6</button>
          <button class="tab-btn" data-tab="7">Set 7</button>
          <button class="tab-btn" data-tab="8">Set 8</button>
          <button class="tab-btn" data-tab="9">Set 9</button>
          <button class="tab-btn" data-tab="10">Set 10</button>
        </div>
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="stickerSearch" placeholder="Cari stiker...">
        </div>
        <div class="sticker-grid" id="stickerGrid">
          <!-- Stickers loaded dynamically -->
        </div>
      </aside>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>Nabu PFP Studio &mdash; drag, drop, dan download PFP kamu!</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
